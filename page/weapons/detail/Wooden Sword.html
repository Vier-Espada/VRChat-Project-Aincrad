<!DOCTYPE html>
<html lang="ja">
<head>

<div class="page-content">

    <h1 class="page-title">Wooden Sword</h1>

   
    <div class="weapon-image">

    <div id="info" class="tab-content active">

    <div id="howto" class="tab-content">

        <li>ショップ</li>
        <li>クエスト</li>
        <li>宝箱</li>
        <li>モンスタードロップ</li>
        <li>その他</li>
      </ul>
    </div>

  </section>

</div>


<script src="/VRChat-Project-Aincrad/assets/ui/layout.js"></script>
