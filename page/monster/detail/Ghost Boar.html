<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ghost Boar</title>

<link rel="stylesheet"
href="../../../assets/ui/layout.css">

<link rel="stylesheet"
href="detail.css">

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="page-content">

<section class="monster-page">

<h1 class="page-title">
    Ghost Boar
</h1>

<div class="monster-layout">

    <!-- 左 -->
    <aside class="monster-side">

        <img src="../monsterpng/Ghost Boar.png">

        <h2>Ghost Boar</h2>

        <p><strong>Col:</strong> 40</p>
        <p><strong>経験値:</strong> 50</p>
        <p><strong>Drop:</strong>
        Potion, Metal Scraps</p>

    </aside>


    <!-- 右 -->
    <main class="monster-main">

        <div class="top-bar">
            <button class="back-btn"
            onclick="history.back()">
                ← 戻る
            </button>
        </div>


        <div class="tabs">

            <button class="active"
            onclick="showTab('info')">
                基本情報
            </button>

            <button onclick="showTab('map')">
                出現マップ
            </button>

            <button onclick="showTab('attack')">
                攻撃
            </button>

        </div>


        <!-- 基本 -->
        <section id="info"
        class="tab-content active">

            <h2>モンスター詳細</h2>

            <p>
                強さはと変わらない。<br>
                
            </p>

        </section>


        <!-- マップ -->
        <section id="map"
        class="tab-content">

            <div class="floor-list">

                <button class="floor-btn"
                onclick="changeMap('map/Ghost Boar_floor1.png',this)">
                    1階層
                </button>

                <button class="floor-btn"
                onclick="changeMap(null,this)">
                    2階層
                </button>

            </div>

            <div class="map-box"
            id="mapBox">
                マップを選択
            </div>

        </section>


        <!-- 攻撃 -->
        <section id="attack"
        class="tab-content">

            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 頭突き-1
                </div>

                <div class="attack-content">

                    <p>
                        頭突き攻撃。<br>
                        後方へノックバックあり。
                    </p>

                    <video controls>
                        <source src="video/Ghost Boar/Ghost Boar_atk1.mp4">
                    </video>

                </div>

            </div>


            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 頭突き-2
                </div>

                <div class="attack-content">

                    <p>
                        一歩前に出て頭突き。<br>
                        上方へノックバックあり。
                    </p>

                    <video controls>
                        <source src="video/Ghost Boar/Ghost Boar_atk2.mp4">
                    </video>

                </div>

            </div>


            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 後退 → 突進
                </div>

                <div class="attack-content">

                    <p>
                        距離を取ってから突進する。
                    </p>

                    <video controls>
                        <source src="video/Ghost Boar/Ghost Boar_atk3.mp4">
                    </video>

                </div>

            </div>


            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 突進
                </div>

                <div class="attack-content">

                    <p>
                        遠距離時に高速接近する。
                    </p>

                    <video controls>
                        <source src="video/Ghost Boar/Ghost Boar_atk4.mp4">
                    </video>

                </div>

            </div>

        </section>

    </main>

</div>

</section>
</div>

<script src="../../../assets/ui/layout.js"></script>
<script src="detail.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
