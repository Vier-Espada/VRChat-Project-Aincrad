<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink Wasp</title>

<link rel="stylesheet" href="../../../assets/ui/layout.css">
<link rel="stylesheet" href="detail.css">

<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="page-content">

<section class="monster-page">

<h1 class="page-title">Ink Wasp</h1>

<div class="container">

    <!-- 上 -->
    <section class="top">

        <div class="monster-left">
            <img src="../monsterpng/Ink Wasp.png">
        </div>

        <div class="monster-right">
            <p><strong>Col:</strong> 75</p>
            <p><strong>経験値:</strong> 80</p>
            <p><strong>ドロップ:</strong> Sml.Ink.Sac, Vespid Rapier</p>
        </div>

    </section>


    <!-- 階層 -->
    <section class="floor-section">

        <div class="floor-list">

            <button class="floor-btn"
            onclick="changeMap('map/InkWasp_floor1.png')">
            1階層
            </button>

            <button class="floor-btn"
            onclick="changeMap(null)">
            2階層
            </button>

        </div>

        <div class="map-box" id="mapBox">
            マップを選択
        </div>

    </section>


    <!-- 攻撃 -->
    <section>
        <h2>モンスターの攻撃方法</h2>

        <div class="attack">

            <div class="attack-header"
            onclick="toggle(this)">
            ➤刺突-単発
            </div>

            <div class="attack-content">
                <p>プレイヤーに対して単発の突きを行う。</p>

                <video controls>
                    <source src="video/Ink Wasp/Ink Wasp_atk1.mp4">
                </video>
            </div>

        </div>


        <div class="attack">

            <div class="attack-header"
            onclick="toggle(this)">
            ➤刺突-4発
            </div>

            <div class="attack-content">
                <p>プレイヤーにやや早い速度で接近して刺突攻撃を４回行う。</p>

                <video controls>
                    <source src="video/Ink Wasp/Ink Wasp_atk2.mp4">
                </video>
            </div>
          

           <div class="attack">

            <div class="attack-header"
            onclick="toggle(this)">
            ➤毒
            </div>

            <div class="attack-content">
                <p>プレイヤーとの距離がある場合毒を飛ばす遠距離攻撃を行う。</p>

                <video controls>
                    <source src="video/Ink Wasp/Ink Wasp_atk3.mp4">
                </video>
            </div>
             

        </div>

    </section>

</div>

</section>
</div>

<script src="../../../assets/ui/layout.js"></script>
<script src="detail.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
