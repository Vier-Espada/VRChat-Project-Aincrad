<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Wasp</title>

<link rel="stylesheet"
href="../../../assets/ui/layout.css">

<link rel="stylesheet"
href="detail.css">

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="page-content">

<section class="monster-page">

<h1 class="page-title">
    Wasp
</h1>

<div class="monster-layout">

    <!-- 左 -->
    <aside class="monster-side">

        <img src="../monsterpng/Wasp.png">

        <h2>Wasp</h2>

        <p><strong>Col:</strong> 35</p>
        <p><strong>経験値:</strong> 60</p>
        <p><strong>Drop:</strong>
        Metal Scraps, Vespid Rapier</p>

    </aside>


    <!-- 右 -->
    <main class="monster-main">

        <!-- 戻る -->
        <div class="top-bar">

            <button class="back-btn"
            onclick="history.back()">

                ← 戻る

            </button>

        </div>


        <!-- タブ -->
        <div class="tabs">

            <button class="active"
            onclick="showTab('info')">
                基本情報
            </button>

            <button onclick="showTab('map')">
                出現マップ
            </button>

            <button onclick="showTab('attack')">
                攻撃
            </button>

        </div>


        <!-- 基本 -->
        <section id="info"
        class="tab-content active">

            <h2>モンスター詳細</h2>

            <p>
                初心者狩りのモンスター。<br>
                攻撃力は45と高く、当たり判定もわかりにくいため
                ある程度戦いに慣れていないと倒しづらい。
            </p>

        </section>


        <!-- マップ -->
        <section id="map"
        class="tab-content">

            <div class="floor-list">

                <button class="floor-btn"
                onclick="changeMap('map/Wasp_floor1.png',this)">
                    1階層
                </button>

                <button class="floor-btn"
                onclick="changeMap(null,this)">
                    2階層
                </button>

            </div>

            <div class="map-box"
            id="mapBox">

                マップを選択

            </div>

        </section>


        <!-- 攻撃 -->
        <section id="attack"
        class="tab-content">

            <!-- 攻撃1 -->
            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 刺突-単発
                </div>

                <div class="attack-content">

                    <p>
                        プレイヤーに対して
                        単発の突きを行う。
                    </p>

                    <video controls>
                        <source src="video/Wasp/Wasp_atk1.mp4">
                    </video>

                </div>

            </div>


            <!-- 攻撃2 -->
            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 刺突-4発
                </div>

                <div class="attack-content">

                    <p>
                        やや早い速度で接近し、<br>
                        刺突攻撃を4回行う。
                    </p>

                    <video controls>
                        <source src="video/Wasp/Wasp_atk2.mp4">
                    </video>

                </div>

            </div>


            <!-- 攻撃3 -->
            <div class="attack">

                <div class="attack-header"
                onclick="toggle(this)">
                    ➤ 毒
                </div>

                <div class="attack-content">

                    <p>
                        プレイヤーとの距離がある場合、<br>
                        毒を飛ばす遠距離攻撃を行う。
                    </p>

                    <video controls>
                        <source src="video/Wasp/Wasp_atk3.mp4">
                    </video>

                </div>

            </div>

        </section>

    </main>

</div>

</section>
</div>

<script src="../../../assets/ui/layout.js"></script>
<script src="detail.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
