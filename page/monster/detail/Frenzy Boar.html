<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Frenzy Boar</title>

<link rel="stylesheet" href="../../../assets/ui/layout.css">
<link rel="stylesheet" href="detail.css">

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="page-content">

<section class="monster-detail-top">

<div class="monster-left">

<h1>Frenzy Boar</h1>

<img
src="../monsterpng/boar.png"
class="detail-image"
alt="Frenzy Boar"
>

</div>

<div class="monster-right">

<div class="detail-stat">Col : 20</div>
<div class="detail-stat">EXP : 50</div>

<h2>ドロップ</h2>

<div class="drop-list">
<div class="drop-item">Metal Scraps</div>
<div class="drop-item">Quartanier</div>
</div>

</div>

</section>

<!-- MAP -->

<section class="detail-section">

<h2>出現場所</h2>

<div class="switch-layout">

<div class="switch-buttons" id="mapButtons"></div>

<div class="switch-view">

<img
id="mapImage"
src="../detail/map/Frenzy boar/Frenzy Boar_floor1.png"
>

</div>

</div>

</section>

<!-- ATTACK -->

<section class="detail-section">

<h2>攻撃方法</h2>

<div class="switch-layout">

<div class="switch-buttons" id="attackButtons"></div>

<div class="switch-view">

<video
id="attackVideo"
controls
width="100%"
></video>

<p id="attackDesc"></p>

</div>

</div>

</section>

</div>

<script src="../../../assets/ui/layout.js"></script>
<script src="detail.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
